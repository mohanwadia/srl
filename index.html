<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Journey Planner</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

<div id="app">
  <main id="layout">
    <div id="map"></div>

    <aside id="panel">
      <div id="panel-header">
        <span id="panel-title">mohanwadia.com/srl</span>
        <div class="button-row">
          <button id="reset-btn" class="btn-secondary">Reset</button>
          <button id="share-btn" class="btn-secondary">Share</button>
        </div>
      </div>

      <div id="tabs" role="tablist">
        <button id="tab-journey" class="tab-btn active" data-tab="journey" role="tab" aria-selected="true">Journey</button>
        <button id="tab-isochrone" class="tab-btn" data-tab="isochrone" role="tab" aria-selected="false">Isochrone</button>
      </div>

      <div id="journey-panel" class="tab-panel">
        <div id="instructions" class="instruction-banner">
          <p id="instruction-text">Click the map to set your <strong>origin</strong>.</p>
        </div>

        <div id="combo-selector" class="panel-block hidden">
          <div id="combo-buttons" class="combo-row"></div>
        </div>

        <div id="summary" class="panel-block hidden">
          <div class="summary-total">
            <span id="total-time">—</span><span class="summary-unit">min</span>
          </div>
          <div id="time-bar" class="time-bar"></div>
        </div>

        <div id="itinerary" class="panel-block hidden">
          <h2>Journey</h2>
          <ol id="itinerary-list"></ol>
        </div>

        <div id="empty-state" class="panel-block"></div>
      </div>

      <div id="isochrone-panel" class="tab-panel hidden">
        <div id="layers-panel" class="panel-block">
          <label class="toggle-row">
            <input type="checkbox" id="srl-toggle" checked />
            <span>Suburban Rail Loop</span>
          </label>
          <label class="toggle-row">
            <input type="checkbox" id="bus-reform-toggle" checked />
            <span>Bus Reform</span>
          </label>
        </div>

        <div id="iso-instructions" class="instruction-banner">
          <p id="iso-instruction-text">Click the map to see how far you can travel in <strong>20</strong>, <strong>40</strong>, and <strong>60</strong> minutes.</p>
        </div>

        <div id="iso-legend" class="panel-block">
          <h2>Travel time</h2>
          <ul class="legend-list">
            <li><span class="legend-swatch swatch-20"></span>Within 20 min</li>
            <li><span class="legend-swatch swatch-40"></span>Within 40 min</li>
            <li><span class="legend-swatch swatch-60"></span>Within 60 min</li>
          </ul>
        </div>
      </div>
    </aside>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="app.js?v=2"></script>
</body>
</html>
