<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Journey Planner</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">
  <main id="layout">
    <div id="map"></div>

    <aside id="panel">
      <div id="instructions" class="panel-block">
        <p id="instruction-text">Click the map to set your <strong>origin</strong>.</p>
        <div class="button-row">
          <button id="reset-btn" class="btn-secondary">Reset</button>
          <button id="share-btn" class="btn-secondary hidden">Share</button>
        </div>
      </div>

      <div id="summary" class="panel-block hidden">
        <div class="summary-total">
          <span id="total-time">—</span><span class="summary-unit">min</span>
        </div>
        <div id="time-bar" class="time-bar"></div>
      </div>

      <div id="itinerary" class="panel-block hidden">
        <h2>Journey</h2>
        <ol id="itinerary-list"></ol>
      </div>

      <div id="empty-state" class="panel-block"></div>
    </aside>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="app.js"></script>
</body>
</html>
